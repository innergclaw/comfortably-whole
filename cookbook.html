<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Interactive flipbook cookbook for Comfortably Whole: Real Food for Real Cravings.">
    <title>Comfortably Whole | Interactive Cookbook</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='30' fill='%23b9412e'/%3E%3Ctext x='32' y='40' text-anchor='middle' font-size='28' font-family='Arial' fill='white'%3ECW%3C/text%3E%3C/svg%3E">
    <link rel="preconnect" href="https://unpkg.com">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
    <style>
      :root {
        --ink: #211b18;
        --muted: #6f625c;
        --paper: #fffaf4;
        --cream: #f7efe4;
        --sage: #5c7355;
        --tomato: #b9412e;
        --mustard: #d9a23b;
        --line: rgba(33, 27, 24, 0.14);
        --shadow: 0 20px 60px rgba(33, 27, 24, 0.16);
        --radius: 8px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--paper);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      button,
      input,
      select {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .app {
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 20;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        padding: 14px clamp(16px, 3vw, 36px);
        border-bottom: 1px solid var(--line);
        background: rgba(255, 250, 244, 0.92);
        backdrop-filter: blur(18px);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: 220px;
        font-weight: 900;
      }

      .brand-mark {
        display: grid;
        width: 38px;
        height: 38px;
        place-items: center;
        border-radius: 50%;
        background: var(--tomato);
        color: #fff;
      }

      .brand small {
        display: block;
        color: var(--muted);
        font-size: 0.78rem;
        font-weight: 750;
      }

      .top-actions {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .icon-btn,
      .text-btn,
      .select {
        min-height: 40px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: #fff;
        color: var(--ink);
        box-shadow: none;
      }

      .icon-btn {
        display: inline-grid;
        width: 42px;
        place-items: center;
      }

      .icon-btn[data-fallback]::before {
        content: attr(data-fallback);
        font-size: 1.35rem;
        font-weight: 900;
        line-height: 1;
      }

      .text-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 9px 13px;
        font-weight: 850;
      }

      .text-btn.primary {
        border-color: transparent;
        background: var(--tomato);
        color: #fff;
      }

      .select {
        width: min(34vw, 320px);
        padding: 0 36px 0 12px;
        font-weight: 750;
      }

      .workspace {
        display: grid;
        grid-template-columns: 270px minmax(0, 1fr);
        min-height: 0;
      }

      .sidebar {
        border-right: 1px solid var(--line);
        background: #fff;
        overflow: auto;
      }

      .sidebar-head {
        position: sticky;
        top: 0;
        z-index: 5;
        padding: 18px 16px 12px;
        border-bottom: 1px solid var(--line);
        background: #fff;
      }

      .sidebar h2 {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        font-size: 1.45rem;
      }

      .search {
        width: 100%;
        min-height: 38px;
        margin-top: 12px;
        padding: 0 12px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--paper);
      }

      .recipe-list {
        display: grid;
        gap: 8px;
        padding: 12px;
      }

      .recipe-tab {
        display: grid;
        grid-template-columns: 52px minmax(0, 1fr);
        gap: 10px;
        width: 100%;
        padding: 8px;
        border: 1px solid transparent;
        border-radius: var(--radius);
        background: transparent;
        color: var(--ink);
        text-align: left;
      }

      .recipe-tab[aria-current="true"] {
        border-color: rgba(185, 65, 46, 0.35);
        background: #fff4ec;
      }

      .recipe-tab img {
        width: 52px;
        height: 52px;
        border-radius: 6px;
        object-fit: cover;
      }

      .recipe-tab strong {
        display: block;
        overflow: hidden;
        font-size: 0.9rem;
        line-height: 1.15;
      }

      .recipe-tab span {
        display: block;
        margin-top: 4px;
        color: var(--muted);
        font-size: 0.76rem;
        font-weight: 750;
      }

      .stage {
        min-width: 0;
        padding: clamp(16px, 3vw, 36px);
        overflow: auto;
      }

      .book-shell {
        max-width: 1180px;
        margin: 0 auto;
      }

      .book-controls {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 16px;
      }

      .progress {
        color: var(--muted);
        font-weight: 800;
      }

      .spread {
        position: relative;
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        min-height: min(74vh, 740px);
        perspective: 1800px;
      }

      .page {
        position: relative;
        overflow: hidden;
        border: 1px solid var(--line);
        background: #fffdf8;
        box-shadow: var(--shadow);
      }

      .page.left {
        border-radius: 8px 0 0 8px;
        transform-origin: right center;
      }

      .page.right {
        border-left: 0;
        border-radius: 0 8px 8px 0;
        transform-origin: left center;
      }

      .spread.turning-next .page.right {
        animation: flipNext 460ms ease both;
      }

      .spread.turning-prev .page.left {
        animation: flipPrev 460ms ease both;
      }

      @keyframes flipNext {
        0% { transform: rotateY(0deg); }
        50% { transform: rotateY(-11deg); }
        100% { transform: rotateY(0deg); }
      }

      @keyframes flipPrev {
        0% { transform: rotateY(0deg); }
        50% { transform: rotateY(11deg); }
        100% { transform: rotateY(0deg); }
      }

      .photo-page {
        min-height: 100%;
        display: grid;
        grid-template-rows: minmax(240px, 0.78fr) auto;
      }

      .photo {
        min-height: 0;
      }

      .photo img {
        width: 100%;
        height: 100%;
        min-height: 280px;
        object-fit: cover;
      }

      .intro {
        padding: clamp(20px, 3vw, 34px);
        border-top: 1px solid var(--line);
      }

      .section-label {
        margin: 0 0 10px;
        color: var(--sage);
        font-size: 0.78rem;
        font-weight: 900;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(2.2rem, 4vw, 4.2rem);
        line-height: 0.98;
      }

      .tag {
        margin: 12px 0 0;
        color: var(--muted);
        font-size: 1.02rem;
        font-weight: 760;
      }

      .recipe-page {
        min-height: 100%;
        display: grid;
        grid-template-rows: auto 1fr auto;
        padding: clamp(20px, 3vw, 34px);
      }

      .page-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 14px;
        padding-bottom: 16px;
        border-bottom: 1px solid var(--line);
      }

      .page-number {
        display: grid;
        flex: 0 0 44px;
        width: 44px;
        height: 44px;
        place-items: center;
        border-radius: 50%;
        background: var(--cream);
        color: var(--tomato);
        font-weight: 900;
      }

      .columns {
        display: grid;
        grid-template-columns: 0.78fr 1fr;
        gap: 22px;
        padding: 20px 0;
        min-height: 0;
      }

      .panel {
        min-width: 0;
      }

      .panel h2 {
        margin: 0 0 10px;
        color: var(--sage);
        font-size: 0.95rem;
      }

      ul,
      ol {
        margin: 0;
        padding-left: 1.2rem;
      }

      li {
        margin: 0 0 7px;
        color: #40352f;
        line-height: 1.42;
      }

      .mini-section {
        margin-top: 18px;
      }

      .upgrade {
        margin-top: 16px;
        padding: 14px;
        border-left: 5px solid var(--mustard);
        border-radius: var(--radius);
        background: #fbf1dc;
      }

      .upgrade strong {
        display: block;
        margin-bottom: 4px;
        color: var(--sage);
      }

      .page-tools {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        padding-top: 14px;
        border-top: 1px solid var(--line);
      }

      .toast {
        position: fixed;
        right: 18px;
        bottom: 18px;
        z-index: 30;
        max-width: 340px;
        padding: 12px 14px;
        border: 1px solid rgba(92, 115, 85, 0.24);
        border-radius: var(--radius);
        background: #fff;
        box-shadow: 0 12px 30px rgba(33, 27, 24, 0.16);
        color: var(--ink);
        font-weight: 800;
        opacity: 0;
        transform: translateY(12px);
        pointer-events: none;
        transition: opacity 180ms ease, transform 180ms ease;
      }

      .toast.show {
        opacity: 1;
        transform: translateY(0);
      }

      @media (max-width: 980px) {
        .workspace {
          grid-template-columns: 1fr;
        }

        .sidebar {
          display: none;
        }

        .topbar {
          flex-wrap: wrap;
        }

        .brand {
          min-width: 0;
        }

        .select {
          width: min(100%, 520px);
          flex: 1 1 260px;
        }

        .spread {
          grid-template-columns: 1fr;
        }

        .page.left {
          border-radius: 8px 8px 0 0;
        }

        .page.right {
          border-left: 1px solid var(--line);
          border-top: 0;
          border-radius: 0 0 8px 8px;
        }

        .columns {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 640px) {
        .top-actions {
          width: 100%;
          justify-content: space-between;
        }

        .book-controls {
          align-items: stretch;
        }

        .progress {
          align-self: center;
          font-size: 0.9rem;
        }

        .stage {
          padding: 12px;
        }

        h1 {
          font-size: 2rem;
        }
      }

      @media print {
        .topbar,
        .sidebar,
        .book-controls,
        .page-tools,
        .toast {
          display: none !important;
        }

        .workspace,
        .spread,
        .columns {
          display: block;
        }

        .stage {
          padding: 0;
          overflow: visible;
        }

        .page {
          box-shadow: none;
          border: 0;
          break-after: page;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <a class="brand" href="index.html" aria-label="Back to landing page">
          <span class="brand-mark">CW</span>
          <span>Comfortably Whole<small>Interactive cookbook</small></span>
        </a>
        <select class="select" id="recipeSelect" aria-label="Choose recipe"></select>
        <div class="top-actions">
          <button class="icon-btn" id="prevTop" type="button" aria-label="Previous recipe" title="Previous recipe" data-fallback="‹"></button>
          <button class="icon-btn" id="nextTop" type="button" aria-label="Next recipe" title="Next recipe" data-fallback="›"></button>
          <button class="text-btn" id="copyTop" type="button"><i data-lucide="copy"></i><span>Copy</span></button>
          <button class="text-btn primary" id="emailTop" type="button"><i data-lucide="send"></i><span>Send</span></button>
        </div>
      </header>

      <main class="workspace">
        <aside class="sidebar" aria-label="Recipe list">
          <div class="sidebar-head">
            <h2>Recipe Pages</h2>
            <input class="search" id="searchInput" type="search" placeholder="Search recipes">
          </div>
          <div class="recipe-list" id="recipeList"></div>
        </aside>

        <section class="stage">
          <div class="book-shell">
            <div class="book-controls">
              <button class="text-btn" id="prevRecipe" type="button"><i data-lucide="arrow-left"></i><span>Previous</span></button>
              <div class="progress" id="progressText">Loading cookbook...</div>
              <button class="text-btn" id="nextRecipe" type="button"><span>Next</span><i data-lucide="arrow-right"></i></button>
            </div>

            <article class="spread" id="spread" aria-live="polite">
              <section class="page left">
                <div class="photo-page">
                  <div class="photo"><img id="recipeImage" alt=""></div>
                  <div class="intro">
                    <p class="section-label" id="recipeSection"></p>
                    <h1 id="recipeTitle"></h1>
                    <p class="tag" id="recipeTag"></p>
                  </div>
                </div>
              </section>

              <section class="page right">
                <div class="recipe-page">
                  <div class="page-head">
                    <div>
                      <p class="section-label">Recipe Card</p>
                      <h1 id="recipeTitleSmall"></h1>
                    </div>
                    <div class="page-number" id="pageNumber">1</div>
                  </div>

                  <div class="columns">
                    <div class="panel">
                      <h2>Shopping List</h2>
                      <ul id="ingredientList"></ul>
                      <div id="subsections"></div>
                    </div>
                    <div class="panel">
                      <h2>Directions</h2>
                      <ol id="directionList"></ol>
                      <div id="upgradeBox"></div>
                      <div id="afterSections"></div>
                    </div>
                  </div>

                  <div class="page-tools">
                    <button class="text-btn" id="copyRecipe" type="button"><i data-lucide="copy"></i><span>Copy recipe</span></button>
                    <button class="text-btn" id="notesRecipe" type="button"><i data-lucide="notebook-pen"></i><span>Open Notes</span></button>
                    <button class="text-btn" id="shareRecipe" type="button"><i data-lucide="share-2"></i><span>Share</span></button>
                    <button class="text-btn" id="emailRecipe" type="button"><i data-lucide="mail"></i><span>Email</span></button>
                    <button class="text-btn" id="printRecipe" type="button"><i data-lucide="printer"></i><span>Print</span></button>
                  </div>
                </div>
              </section>
            </article>
          </div>
        </section>
      </main>
    </div>

    <div class="toast" id="toast" role="status"></div>

    <script>
      const state = {
        recipes: [],
        index: 0,
        query: "",
      };

      const els = {
        recipeSelect: document.getElementById("recipeSelect"),
        recipeList: document.getElementById("recipeList"),
        searchInput: document.getElementById("searchInput"),
        spread: document.getElementById("spread"),
        progressText: document.getElementById("progressText"),
        recipeImage: document.getElementById("recipeImage"),
        recipeSection: document.getElementById("recipeSection"),
        recipeTitle: document.getElementById("recipeTitle"),
        recipeTitleSmall: document.getElementById("recipeTitleSmall"),
        recipeTag: document.getElementById("recipeTag"),
        pageNumber: document.getElementById("pageNumber"),
        ingredientList: document.getElementById("ingredientList"),
        directionList: document.getElementById("directionList"),
        subsections: document.getElementById("subsections"),
        afterSections: document.getElementById("afterSections"),
        upgradeBox: document.getElementById("upgradeBox"),
        toast: document.getElementById("toast"),
      };

      function escapeText(text) {
        return String(text || "").replace(/[&<>"']/g, (char) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#039;",
        })[char]);
      }

      function listMarkup(items, ordered = false) {
        const tag = ordered ? "ol" : "ul";
        return `<${tag}>${(items || []).map((item) => `<li>${escapeText(item)}</li>`).join("")}</${tag}>`;
      }

      function recipeText(recipe) {
        const lines = [
          recipe.title,
          recipe.tag,
          "",
          "Shopping List:",
          ...(recipe.ingredients || []).map((item) => `- ${item}`),
        ];

        (recipe.subsections || []).forEach((section) => {
          lines.push("", `${section.title}:`, ...(section.items || []).map((item) => `- ${item}`));
        });

        lines.push("", "Directions:", ...(recipe.directions || []).map((item, index) => `${index + 1}. ${item}`));

        if (recipe.upgrade) {
          lines.push("", `${recipe.upgrade_title || "Favorite Upgrade"}:`, recipe.upgrade);
        }

        (recipe.subsections_after || []).forEach((section) => {
          lines.push("", `${section.title}:`, ...(section.items || []).map((item) => `- ${item}`));
        });

        lines.push("", "From Comfortably Whole: Real Food for Real Cravings");
        return lines.join("\n");
      }

      function currentRecipe() {
        return state.recipes[state.index];
      }

      function showToast(message) {
        els.toast.textContent = message;
        els.toast.classList.add("show");
        window.clearTimeout(showToast.timer);
        showToast.timer = window.setTimeout(() => els.toast.classList.remove("show"), 2400);
      }

      async function copyCurrent(message = "Recipe copied.") {
        const recipe = currentRecipe();
        if (!recipe) return;
        await navigator.clipboard.writeText(recipeText(recipe));
        showToast(message);
      }

      function emailCurrent() {
        const recipe = currentRecipe();
        if (!recipe) return;
        const subject = encodeURIComponent(`Comfortably Whole recipe: ${recipe.title}`);
        const body = encodeURIComponent(recipeText(recipe));
        window.location.href = `mailto:?subject=${subject}&body=${body}`;
      }

      async function shareCurrent() {
        const recipe = currentRecipe();
        if (!recipe) return;
        const text = recipeText(recipe);
        if (navigator.share) {
          await navigator.share({ title: recipe.title, text });
          return;
        }
        await navigator.clipboard.writeText(text);
        showToast("Sharing is not available here, so the recipe was copied.");
      }

      async function openNotesCurrent() {
        await copyCurrent("Recipe copied. Paste it into Apple Notes.");
        window.setTimeout(() => {
          window.location.href = "notes://";
        }, 250);
      }

      function sectionBlock(section) {
        return `
          <div class="mini-section">
            <h2>${escapeText(section.title)}</h2>
            ${listMarkup(section.items || [])}
          </div>
        `;
      }

      function renderRecipe(direction = "") {
        const recipe = currentRecipe();
        if (!recipe) return;

        if (direction) {
          els.spread.classList.remove("turning-next", "turning-prev");
          void els.spread.offsetWidth;
          els.spread.classList.add(direction === "next" ? "turning-next" : "turning-prev");
        }

        els.recipeImage.src = recipe.image;
        els.recipeImage.alt = recipe.title;
        els.recipeSection.textContent = recipe.section;
        els.recipeTitle.textContent = recipe.title;
        els.recipeTitleSmall.textContent = recipe.title;
        els.recipeTag.textContent = recipe.tag;
        els.pageNumber.textContent = recipe.page;
        els.progressText.textContent = `Recipe ${state.index + 1} of ${state.recipes.length}`;

        els.ingredientList.innerHTML = (recipe.ingredients || []).map((item) => `<li>${escapeText(item)}</li>`).join("");
        els.directionList.innerHTML = (recipe.directions || []).map((item) => `<li>${escapeText(item)}</li>`).join("");
        els.subsections.innerHTML = (recipe.subsections || []).map(sectionBlock).join("");
        els.afterSections.innerHTML = (recipe.subsections_after || []).map(sectionBlock).join("");
        els.upgradeBox.innerHTML = recipe.upgrade
          ? `<div class="upgrade"><strong>${escapeText(recipe.upgrade_title || "Favorite Upgrade")}</strong>${escapeText(recipe.upgrade)}</div>`
          : "";

        els.recipeSelect.value = String(state.index);
        renderList();
      }

      function filteredRecipes() {
        const query = state.query.trim().toLowerCase();
        if (!query) return state.recipes;
        return state.recipes.filter((recipe) => {
          const haystack = [recipe.title, recipe.section, recipe.tag, ...(recipe.ingredients || [])].join(" ").toLowerCase();
          return haystack.includes(query);
        });
      }

      function renderList() {
        const items = filteredRecipes();
        els.recipeList.innerHTML = items.map((recipe) => {
          const index = state.recipes.indexOf(recipe);
          const current = index === state.index ? "true" : "false";
          return `
            <button class="recipe-tab" type="button" aria-current="${current}" data-index="${index}">
              <img src="${escapeText(recipe.image)}" alt="">
              <span>
                <strong>${escapeText(recipe.title)}</strong>
                <span>${escapeText(recipe.section)}</span>
              </span>
            </button>
          `;
        }).join("");
      }

      function goTo(index, direction = "") {
        const max = state.recipes.length - 1;
        state.index = Math.max(0, Math.min(max, index));
        renderRecipe(direction);
      }

      function nextRecipe() {
        goTo((state.index + 1) % state.recipes.length, "next");
      }

      function prevRecipe() {
        goTo((state.index - 1 + state.recipes.length) % state.recipes.length, "prev");
      }

      function bindEvents() {
        document.getElementById("nextRecipe").addEventListener("click", nextRecipe);
        document.getElementById("nextTop").addEventListener("click", nextRecipe);
        document.getElementById("prevRecipe").addEventListener("click", prevRecipe);
        document.getElementById("prevTop").addEventListener("click", prevRecipe);
        document.getElementById("copyRecipe").addEventListener("click", () => copyCurrent());
        document.getElementById("copyTop").addEventListener("click", () => copyCurrent());
        document.getElementById("notesRecipe").addEventListener("click", openNotesCurrent);
        document.getElementById("shareRecipe").addEventListener("click", shareCurrent);
        document.getElementById("emailRecipe").addEventListener("click", emailCurrent);
        document.getElementById("emailTop").addEventListener("click", emailCurrent);
        document.getElementById("printRecipe").addEventListener("click", () => window.print());

        els.recipeSelect.addEventListener("change", (event) => {
          goTo(Number(event.target.value));
        });

        els.searchInput.addEventListener("input", (event) => {
          state.query = event.target.value;
          renderList();
        });

        els.recipeList.addEventListener("click", (event) => {
          const button = event.target.closest("[data-index]");
          if (!button) return;
          goTo(Number(button.dataset.index));
        });

        document.addEventListener("keydown", (event) => {
          if (event.key === "ArrowRight") nextRecipe();
          if (event.key === "ArrowLeft") prevRecipe();
        });
      }

      async function init() {
        const response = await fetch("assets/data/recipes.json");
        state.recipes = await response.json();
        els.recipeSelect.innerHTML = state.recipes.map((recipe, index) => (
          `<option value="${index}">${escapeText(recipe.title)}</option>`
        )).join("");
        bindEvents();
        renderRecipe();
        if (window.lucide) window.lucide.createIcons();
      }

      init().catch((error) => {
        console.error(error);
        els.progressText.textContent = "Could not load cookbook data.";
      });
    </script>
  </body>
</html>
